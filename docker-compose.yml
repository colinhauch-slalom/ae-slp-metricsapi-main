# Docker Compose for MetricsAPI
#
# [DEF-009] Hardcoded volume mount to /Users/alex/data (author's local path)
# [DEF-010] Hardcoded password 'alex_local_dev' (not parameterized)
# [DEF-011] PostgreSQL health check uses `psql` via brew path (macOS-specific)

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: metricsapi
      # [DEF-010] Hardcoded password — should be in .env or secrets
      POSTGRES_PASSWORD: alex_local_dev
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    # [DEF-011] Health check — FIXED to use pg_isready (portable across all platforms)
    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U postgres -d metricsapi"
      ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
